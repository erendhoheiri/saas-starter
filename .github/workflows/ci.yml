name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: starter
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-test:
        image: postgres:16
        env:
          POSTGRES_DB: starter_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/starter

      - name: Run test migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/starter_test

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/starter_test
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/starter_test
          AUTH_SECRET: ci-test-secret-32-chars-minimum!!

      - name: Test (mocked)
        run: bun run --filter @starter/api test:mocked

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/starter
